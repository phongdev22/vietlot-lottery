<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Vietlott Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3e3e;
            --secondary: #ffb800;
            --accent: #7000ff;
            --bg: #03040a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Mesh Gradient Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: var(--bg);
            filter: blur(100px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        .blob-1 { background: var(--primary); top: -10%; left: -10%; opacity: 0.4; }
        .blob-2 { background: var(--accent); bottom: -10%; right: -10%; opacity: 0.3; animation-delay: -5s; }
        .blob-3 { background: var(--secondary); top: 50%; left: 50%; opacity: 0.2; animation-delay: -10s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(200px, 100px) scale(1.2); }
        }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-radius: 32px;
            padding: 50px 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .logo-box {
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .logo-subtext {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            margin-left: 12px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 62, 62, 0.1);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, #e62e2e 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px var(--primary);
            opacity: 0.95;
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(255, 62, 62, 0.1);
            color: var(--primary);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 20px;
            border: 1px solid rgba(255, 62, 62, 0.2);
        }

        .footer-note {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .highlight {
            color: var(--secondary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-box">
                <div class="logo-text">VIETLOTT PRO</div>
                <div class="logo-subtext">AI Analysis Engine</div>
            </div>

            <form method="POST">
                <div class="input-group">
                    <label>TÀI KHOẢN ĐẠI CA</label>
                    <input type="text" name="username" placeholder="Nhập username..." required autofocus>
                </div>
                <div class="input-group">
                    <label>MẬT MÃ BẢO MẬT</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit">XÁC NHẬN ĐĂNG NHẬP</button>
            </form>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="error-msg">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="footer-note">
                Dành riêng cho <span class="highlight">Đại ca phongzann</span>
            </div>
        </div>
    </div>
</body>
</html>
